name: daily-briefing

on:
  schedule:
    # GitHub Actions cron is UTC ONLY. There is no timezone field — an unknown key
    # under `schedule:` makes the workflow file invalid, and an invalid workflow
    # registers NO schedule at all (it just silently never fires).
    #
    #   12:00 UTC == 05:00 PDT (summer, UTC-7)
    #             == 04:00 PST (winter, UTC-8)
    #
    # It is currently PDT, so this fires at 5 AM Pacific. When DST ends (Nov 1),
    # this becomes 4 AM — change to "0 13 * * *" then to hold 5 AM through winter.
    # No single fixed cron is 5 AM Pacific year-round; that is a GitHub limitation.
    #
    # Scheduled runs are best-effort and are frequently delayed 5-30+ min at the
    # top of the hour under load. ":07" dodges the worst of the queue.
    - cron: "7 12 * * *"
  workflow_dispatch:          # enables the manual "Run workflow" button

permissions:
  contents: write             # only for the keepalive commit (final step)

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 45       # 181 feeds + throttled LLM calls ~= 12-18 min
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        working-directory: pipeline
        run: pip install -r requirements.txt

      - name: Run pipeline
        working-directory: pipeline
        env:
          PYTHONUNBUFFERED: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_GIST_TOKEN:  ${{ secrets.GH_GIST_TOKEN }}
          GIST_ID:        ${{ secrets.GIST_ID }}

          # ---- models (Flash / Flash-Lite only; never Pro on the free tier) ----
          GATEKEEPER_MODEL: gemini-3.1-flash-lite
          EDITOR_MODEL:     gemini-3.5-flash
          EDITOR_FALLBACK_MODELS:     gemini-3.1-flash-lite
          GATEKEEPER_FALLBACK_MODELS: gemini-3.5-flash

          # ---- rate control ----------------------------------------------
          # Global minimum gap between ANY two Gemini calls. 5s => 12 RPM hard
          # ceiling, safely under the 15 RPM free-tier limit. Counts retries too.
          LLM_MIN_INTERVAL: "5"

          # ---- ingest scaling (181 feeds) --------------------------------
          INGEST_WORKERS: "16"
          REQUEST_TIMEOUT: "10"
          LOOKBACK_HOURS: "24"
          MAX_PER_FEED: "25"
          MAX_PER_SOURCE: "12"     # stops one noisy feed dominating the day
          MAX_TOTAL: "1500"        # global safety valve
          DATELESS_POLICY: "keep"  # "drop" = strict <24h, but loses dateless blogs
          ALLOWLIST_MODE: ""       # "1" enables the keyword allowlist (see README)

          # ---- summarization ceiling -------------------------------------
          GATEKEEPER_BATCH_SIZE: "30"
          MAX_FEATURES: "120"      # overflow spills to also_notable, never dropped
          EDITOR_BATCH_SIZE: "10"
        run: python run.py

      - name: Publish feed health report to job summary
        if: ${{ always() }}
        working-directory: pipeline
        run: |
          if [ -f feed_report.md ]; then
            cat feed_report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No feed_report.md produced (ingest did not complete)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload feed health report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: feed-report
          path: |
            pipeline/feed_report.md
            pipeline/feed_report.json
          if-no-files-found: warn
          retention-days: 14

      # -------------------------------------------------------------------------
      # KEEPALIVE — GitHub auto-disables a scheduled workflow after 60 days with
      # no commit on the default branch. This pipeline writes only to a Gist, so
      # the repo never receives commits from normal operation and the cron would
      # stop ~day 60. Commits a heartbeat once the branch has been quiet 50+ days.
      # Runs even if the pipeline failed, so a bad run can't let the schedule lapse.
      - name: Keepalive (avoid 60-day cron auto-disable)
        if: ${{ always() && github.event_name == 'schedule' }}
        run: |
          last=$(git log -1 --format=%ct 2>/dev/null || echo 0)
          now=$(date +%s)
          age=$(( (now - last) / 86400 ))
          if [ "$last" -eq 0 ] || [ "$age" -ge 50 ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            mkdir -p .github
            date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/.keepalive
            git add .github/.keepalive
            git commit -m "chore: keepalive [skip ci]" || exit 0
            git push
          else
            echo "Default branch last touched ${age}d ago; no keepalive needed."
          fi
