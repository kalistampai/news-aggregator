name: daily-briefing

on:
  schedule:
    - cron: "0 13 * * *"    # 13:00 UTC = 06:00 PST / 05:00 PDT (bump to 0 14 * * * for steady 6AM Pacific in summer)
  workflow_dispatch:          # enables the manual "Run workflow" button

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: pipeline
        run: pip install -r requirements.txt

      - name: Run pipeline
        working-directory: pipeline
        env:
          PYTHONUNBUFFERED: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_GIST_TOKEN:  ${{ secrets.GH_GIST_TOKEN }}
          GIST_ID:        ${{ secrets.GIST_ID }}
          GATEKEEPER_MODEL: gemini-2.5-flash
          EDITOR_MODEL:     gemini-2.5-flash
        run: python run.py
