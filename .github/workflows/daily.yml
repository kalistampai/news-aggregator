name: daily-briefing

on:
  schedule:
    # 06:00 America/Los_Angeles. GitHub cron is UTC and does NOT observe DST,
    # so this is 13:00 UTC (PST offset). Adjust to 12:00 UTC during PDT if you care.
    - cron: "0 13 * * *"
  workflow_dispatch: {}   # manual "Run workflow" button

concurrency:
  group: briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_GIST_TOKEN:     ${{ secrets.GH_GIST_TOKEN }}
          GIST_ID:           ${{ secrets.GIST_ID }}
          # Optional overrides:
          # GATEKEEPER_MODEL: claude-haiku-4-5-20251001
          # EDITOR_MODEL:     claude-sonnet-5
        run: python run.py
